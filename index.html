<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetTracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:#0f172a;color:white;}
.app{max-width:480px;margin:auto;padding:15px;}
h1{font-size:22px;margin-bottom:10px;}
.card{background:#1e293b;padding:15px;border-radius:14px;margin-bottom:15px;}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{flex:1;padding:10px;border-radius:10px;background:#334155;text-align:center;cursor:pointer;font-size:14px;}
.tab.active{background:#22c55e;}
input,select{width:100%;padding:12px;margin-bottom:10px;border-radius:10px;border:none;font-size:16px;}
button{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;}
.add-btn{background:#22c55e;color:white;}
.delete-btn{background:#ef4444;color:white;margin-top:10px;}
.bet{background:#1e293b;padding:15px;border-radius:14px;margin-bottom:10px;}
.bet-top{display:flex;justify-content:space-between;margin-bottom:8px;font-weight:bold;}
.green{color:#22c55e;font-weight:bold;}
.red{color:#ef4444;font-weight:bold;}
.stats{position:sticky;top:0;background:#0f172a;padding-bottom:10px;z-index:100;}
</style>
</head>
<body>

<div class="app">

<div class="stats">
<h1>☁️ BetTracker Pro</h1>

<div class="card">
<div>💰 Kontostand: <b><span id="bankroll">540.00</span> €</b></div>
<div style="margin-top:6px;">Gesamtgewinn: <b><span id="totalProfit">540.00</span> €</b></div>
<div>🎾 Tennis: <b><span id="tennisProfit">182.00</span> €</b></div>
<div>⚽ Fußball: <b><span id="footballProfit">358.00</span> €</b></div>
<div style="margin-top:8px;">Zeitraum Gewinn: 
<b><span id="periodProfit">0.00</span> €</b></div>
</div>
</div>

<div class="tabs">
<div class="tab active" onclick="setFilter('today')">Heute</div>
<div class="tab" onclick="setFilter('yesterday')">Gestern</div>
<div class="tab" onclick="setFilter('week')">Woche</div>
<div class="tab" onclick="setFilter('all')">Alle</div>
</div>

<div class="card">
<input type="date" id="date">
<select id="sport">
<option>Fußball</option>
<option>Tennis</option>
</select>
<input type="number" step="0.01" id="odds" placeholder="Quote">
<input type="number" step="0.01" id="stake" placeholder="Einsatz €">
<select id="status">
<option value="won">Gewonnen</option>
<option value="lost">Verloren</option>
</select>
<button class="add-btn" onclick="addBet()">Wette hinzufügen</button>
</div>

<div id="betList"></div>

</div>

<script>

const START_TOTAL = 540;
const START_TENNIS = 182;
const START_FOOTBALL = 358;

const supabaseUrl = "https://wmhmniauvvmoopdkjbtg.supabase.co";
const supabaseKey = "sb_publishable_w0f7QQyrPLRHAMMJEIvlcQ_oNFN_QJ2";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let allBets = [];
let currentFilter = "today";

async function loadBets(){
const { data } = await client
.from("bets")
.select("*")
.order("created_at",{ascending:false});
allBets = data || [];
render();
}

function getMonday(date){
const d = new Date(date);
const day = d.getDay();
const diff = d.getDate() - day + (day===0?-6:1);
return new Date(d.setDate(diff));
}

function setFilter(filter){
currentFilter = filter;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");
render();
}

function render(){

let totalProfit = START_TOTAL;
let tennisProfit = START_TENNIS;
let footballProfit = START_FOOTBALL;
let periodProfit = 0;
let bankroll = 540; // echtes Startkonto

const list = document.getElementById("betList");
list.innerHTML="";

const today = new Date().toISOString().split("T")[0];
const yesterdayDate = new Date();
yesterdayDate.setDate(yesterdayDate.getDate()-1);
const yesterday = yesterdayDate.toISOString().split("T")[0];
const monday = getMonday(new Date()).toISOString().split("T")[0];

let filtered = allBets.filter(b=>{
if(currentFilter==="today") return b.date===today;
if(currentFilter==="yesterday") return b.date===yesterday;
if(currentFilter==="week") return b.date>=monday;
return true;
});

// WICHTIG: Chronologisch berechnen
const sorted = [...allBets].sort((a,b)=> new Date(a.date) - new Date(b.date));

sorted.forEach(b=>{

// Einsatz wird vom Konto abgezogen
bankroll -= b.stake;

// Wenn gewonnen → Auszahlung drauf
if(b.status==="won"){
bankroll += b.stake * b.odds;
}

totalProfit += b.profit;

if(b.sport==="Tennis") tennisProfit += b.profit;
if(b.sport==="Fußball") footballProfit += b.profit;
});

filtered.forEach(b=>{
periodProfit+=b.profit;

list.innerHTML+=`
<div class="bet">
<div class="bet-top">
<div>${b.date}</div>
<div>${b.sport}</div>
</div>
<div>Quote: ${b.odds}</div>
<div>Einsatz: ${b.stake.toFixed(2)} €</div>
<div class="${b.profit>=0?'green':'red'}">
${b.profit.toFixed(2)} €
</div>
<button class="delete-btn" onclick="deleteBet('${b.id}')">Löschen</button>
</div>
`;
});

document.getElementById("bankroll").innerText=bankroll.toFixed(2);
document.getElementById("totalProfit").innerText=totalProfit.toFixed(2);
document.getElementById("tennisProfit").innerText=tennisProfit.toFixed(2);
document.getElementById("footballProfit").innerText=footballProfit.toFixed(2);
document.getElementById("periodProfit").innerText=periodProfit.toFixed(2);
}

async function addBet(){
const date = document.getElementById("date").value;
const sport = document.getElementById("sport").value;
const odds = parseFloat(document.getElementById("odds").value);
const stake = parseFloat(document.getElementById("stake").value);
const status = document.getElementById("status").value;

if(!date || !odds || !stake){
alert("Alles ausfüllen");
return;
}

const profit = status==="won" ? (stake*odds - stake) : -stake;
await client.from("bets").insert([{date,sport,odds,stake,profit,status}]);
loadBets();
}

async function deleteBet(id){
await client.from("bets").delete().eq("id",id);
loadBets();
}

loadBets();

</script>
</body>
</html>
