<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetTracker Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
.container { max-width:1100px; margin:auto;}
input,select,button { padding:8px; margin:5px; border-radius:6px; border:none;}
button { background:#22c55e; color:white; cursor:pointer;}
.delete-btn { background:#ef4444;}
table { width:100%; margin-top:20px; border-collapse:collapse;}
th,td { padding:10px; text-align:center; border-bottom:1px solid #334155;}
.stats { margin-top:30px; background:#1e293b; padding:20px; border-radius:10px;}
</style>
</head>
<body>

<div class="container">
<h1>☁️ BetTracker Cloud</h1>

<div>
<input type="date" id="date">
<select id="sport">
<option>Fußball</option>
<option>Tennis</option>
</select>
<input type="number" step="0.01" id="odds" placeholder="Quote">
<input type="number" step="0.01" id="stake" placeholder="Einsatz €">
<select id="status">
<option value="won">Won</option>
<option value="lost">Lost</option>
</select>
<button id="addBtn">Hinzufügen</button>
</div>

<table>
<thead>
<tr>
<th>Datum</th>
<th>Sport</th>
<th>Quote</th>
<th>Einsatz</th>
<th>Gewinn</th>
<th>Löschen</th>
</tr>
</thead>
<tbody id="betTable"></tbody>
</table>

<div class="stats">
<h2>📊 Statistik</h2>
<p>Gesamtgewinn: <b><span id="totalProfit">540.00</span> €</b></p>
<p>🎾 Tennis Gewinn: <b><span id="tennisProfit">182.00</span> €</b></p>
<p>⚽ Fußball Gewinn: <b><span id="footballProfit">358.00</span> €</b></p>
</div>

</div>

<script>

// 🔒 Fixe Startwerte
const START_TOTAL = 540;
const START_TENNIS = 182;
const START_FOOTBALL = 358;

// ☁️ Supabase Config
const supabaseUrl = "https://wmhmniauvvmoopdkjbtg.supabase.co";
const supabaseKey = "sb_publishable_w0f7QQyrPLRHAMMJEIvlcQ_oNFN_QJ2";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// 📥 Laden
async function loadBets() {
const { data, error } = await client
.from("bets")
.select("*")
.order("created_at", { ascending: true });

if(error){
console.error(error);
alert(error.message);
return;
}

render(data || []);
}

// ➕ Hinzufügen
async function addBet() {

const date = document.getElementById("date").value;
const sport = document.getElementById("sport").value;
const odds = parseFloat(document.getElementById("odds").value);
const stake = parseFloat(document.getElementById("stake").value);
const status = document.getElementById("status").value;

if(!date || !odds || !stake){
alert("Bitte alles ausfüllen");
return;
}

const profit = status==="won" ? (stake*odds - stake) : -stake;

const { error } = await client.from("bets").insert([
{ date, sport, odds, stake, profit, status }
]);

if(error){
alert(error.message);
return;
}

loadBets();
}

// ❌ Löschen
async function deleteBet(id){
await client.from("bets").delete().eq("id", id);
loadBets();
}

// 📊 Render
function render(bets){

let totalProfit = START_TOTAL;
let tennisProfit = START_TENNIS;
let footballProfit = START_FOOTBALL;

const table = document.getElementById("betTable");
table.innerHTML="";

bets.forEach(b => {

totalProfit += b.profit;

if(b.sport==="Tennis") tennisProfit += b.profit;
if(b.sport==="Fußball") footballProfit += b.profit;

table.innerHTML += `
<tr>
<td>${b.date}</td>
<td>${b.sport}</td>
<td>${b.odds}</td>
<td>${b.stake.toFixed(2)} €</td>
<td style="color:${b.profit>=0?'#22c55e':'#ef4444'}">
${b.profit.toFixed(2)} €
</td>
<td><button class="delete-btn" onclick="deleteBet('${b.id}')">X</button></td>
</tr>
`;
});

document.getElementById("totalProfit").innerText = totalProfit.toFixed(2);
document.getElementById("tennisProfit").innerText = tennisProfit.toFixed(2);
document.getElementById("footballProfit").innerText = footballProfit.toFixed(2);

}

document.getElementById("addBtn").addEventListener("click", addBet);

loadBets();

</script>
</body>
</html>
