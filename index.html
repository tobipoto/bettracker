<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetTracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:#0f172a;
color:white;
}

.app{
max-width:480px;
margin:auto;
padding:15px;
}

h1{
font-size:22px;
margin-bottom:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.add-btn{
background:#22c55e;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
margin-top:10px;
}

.bet{
background:#1e293b;
padding:15px;
border-radius:14px;
margin-bottom:10px;
}

.bet-top{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-weight:bold;
}

.profit{
font-weight:bold;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.stats{
position:sticky;
top:0;
background:#0f172a;
padding-bottom:10px;
z-index:100;
}
</style>
</head>
<body>

<div class="app">

<div class="stats">
<h1>☁️ BetTracker</h1>

<div class="card">
<div>Gesamt: <b><span id="totalProfit">540.00</span> €</b></div>
<div>🎾 Tennis: <b><span id="tennisProfit">182.00</span> €</b></div>
<div>⚽ Fußball: <b><span id="footballProfit">358.00</span> €</b></div>
</div>
</div>

<div class="card">
<input type="date" id="date">
<select id="sport">
<option>Fußball</option>
<option>Tennis</option>
</select>
<input type="number" step="0.01" id="odds" placeholder="Quote">
<input type="number" step="0.01" id="stake" placeholder="Einsatz €">
<select id="status">
<option value="won">Gewonnen</option>
<option value="lost">Verloren</option>
</select>
<button class="add-btn" id="addBtn">Wette hinzufügen</button>
</div>

<div id="betList"></div>

</div>

<script>

// Fixe Startwerte
const START_TOTAL = 540;
const START_TENNIS = 182;
const START_FOOTBALL = 358;

const supabaseUrl = "https://wmhmniauvvmoopdkjbtg.supabase.co";
const supabaseKey = "sb_publishable_w0f7QQyrPLRHAMMJEIvlcQ_oNFN_QJ2";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function loadBets(){
const { data } = await client
.from("bets")
.select("*")
.order("created_at",{ascending:false});
render(data||[]);
}

async function addBet(){

const date = document.getElementById("date").value;
const sport = document.getElementById("sport").value;
const odds = parseFloat(document.getElementById("odds").value);
const stake = parseFloat(document.getElementById("stake").value);
const status = document.getElementById("status").value;

if(!date || !odds || !stake){
alert("Alles ausfüllen");
return;
}

const profit = status==="won" ? (stake*odds - stake) : -stake;

await client.from("bets").insert([{date,sport,odds,stake,profit,status}]);
loadBets();
}

async function deleteBet(id){
await client.from("bets").delete().eq("id",id);
loadBets();
}

function render(bets){

let totalProfit = START_TOTAL;
let tennisProfit = START_TENNIS;
let footballProfit = START_FOOTBALL;

const list = document.getElementById("betList");
list.innerHTML="";

bets.forEach(b=>{

totalProfit += b.profit;
if(b.sport==="Tennis") tennisProfit += b.profit;
if(b.sport==="Fußball") footballProfit += b.profit;

list.innerHTML+=`
<div class="bet">
<div class="bet-top">
<div>${b.date}</div>
<div>${b.sport}</div>
</div>
<div>Quote: ${b.odds}</div>
<div>Einsatz: ${b.stake.toFixed(2)} €</div>
<div class="profit ${b.profit>=0?'green':'red'}">
${b.profit.toFixed(2)} €
</div>
<button class="delete-btn" onclick="deleteBet('${b.id}')">Löschen</button>
</div>
`;
});

document.getElementById("totalProfit").innerText=totalProfit.toFixed(2);
document.getElementById("tennisProfit").innerText=tennisProfit.toFixed(2);
document.getElementById("footballProfit").innerText=footballProfit.toFixed(2);
}

document.getElementById("addBtn").addEventListener("click",addBet);

loadBets();

</script>
</body>
</html>
